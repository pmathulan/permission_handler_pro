name: permission_handler_windows_pro
description: Permission plugin for Flutter (Pro version by SiTechra (Pvt) Ltd). This plugin provides the Windows API to request and check permissions.
version: 0.2.1
homepage: https://pub.dev/packages/permission_handler_pro

flutter:
  plugin:
    implements: permission_handler_pro
    platforms:
      windows:
        pluginClass: PermissionHandlerWindowsPlugin

dependencies:
  flutter:
    sdk: flutter
  permission_handler_platform_interface_pro: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  plugin_platform_interface: ^2.0.0

environment:
  sdk: ">=2.12.0 <4.0.0"
  flutter: ">=2.0.0"

dependency_overrides:
  permission_handler_platform_interface_pro:
    path: ../permission_handler_platform_interface
